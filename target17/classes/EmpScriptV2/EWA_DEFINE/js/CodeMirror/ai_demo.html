<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
<title>AI 辅助编程 Demo</title>
<style>
* { box-sizing: border-box; }
body { margin: 0; overflow: hidden; font-family: "Microsoft YaHei", tahoma, arial, sans-serif; }

#toolbar {
  position: absolute; top: 0; left: 0; right: 0; height: 38px;
  background: #252526; display: flex; align-items: center; gap: 8px;
  padding: 0 10px; border-bottom: 1px solid #3c3c3c; z-index: 10;
}
#toolbar select, #toolbar button {
  padding: 4px 10px; border-radius: 3px; border: 1px solid #555;
  background: #3c3c3c; color: #d4d4d4; font-size: 13px; cursor: pointer;
}
#toolbar button:hover { background: #0e639c; color: #fff; border-color: #0e639c; }
#toolbar select:focus, #toolbar button:focus { outline: none; }
#toolbar .spacer { flex: 1; }
#toolbar label { color: #888; font-size: 12px; }
#toolbar #mode_status { color: #4ec9b0; font-size: 12px; }
#toolbar #ai_status { color: #ce9178; font-size: 11px; margin-left: 2px; }

#code {
  margin: 0; position: absolute;
  top: 38px; bottom: 0; left: 0; right: 0;
}

/* 设置覆盖层 */
#settings_overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6); z-index: 200000; justify-content: center; align-items: center;
}
#settings_overlay.show { display: flex; }
#settings_dialog {
  background: #252526; border: 1px solid #3c3c3c; border-radius: 8px;
  width: 480px; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,.6);
  color: #d4d4d4; font-size: 13px;
}
#settings_dialog h2 {
  margin: 0; padding: 14px 18px; font-size: 16px; font-weight: normal;
  border-bottom: 1px solid #3c3c3c;
}
#settings_dialog .body { padding: 14px 18px; }
.s_row {
  display: flex; align-items: center; margin-bottom: 12px; gap: 10px;
}
.s_row .s_label { width: 72px; font-size: 12px; color: #888; text-align: right; flex-shrink: 0; }
.s_row select, .s_row input {
  flex: 1; background: #3c3c3c; color: #d4d4d4; border: 1px solid #555;
  border-radius: 3px; padding: 5px 8px; font-size: 13px; outline: none;
}
.s_row select:focus, .s_row input:focus { border-color: #007acc; }
.s_row input[type=password] { font-family: monospace; }
.s_btns {
  display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px;
  padding-top: 12px; border-top: 1px solid #3c3c3c;
}
.s_btns button {
  padding: 6px 18px; border-radius: 4px; border: 1px solid #555;
  cursor: pointer; font-size: 13px;
}
.s_btns .btn_save  { background: #0e639c; color: #fff; border-color: #0e639c; }
.s_btns .btn_save:hover  { background: #1177bb; }
.s_btns .btn_cancel { background: #3c3c3c; color: #ccc; }
.s_btns .btn_cancel:hover { background: #555; }
.s_btns .btn_test   { background: #3a3a3a; color: #4ec9b0; }
.s_btns .btn_test:hover   { background: #555; }
.s_row .s_hint { font-size: 10px; color: #6a6a6a; margin-top: 2px; }
.s_field_group { margin-bottom: 12px; }
.s_field_group .s_label { display: block; margin-bottom: 4px; font-size: 12px; color: #888; }

#test_result {
  margin-top: 10px; padding: 8px 12px; border-radius: 4px; font-size: 12px;
  display: none; white-space: pre-wrap; max-height: 120px; overflow-y: auto;
}
#test_result.ok  { display:block; background: #1a3a1a; color: #4ec9b0; border:1px solid #2d5a2d; }
#test_result.err { display:block; background: #3a1a1a; color: #f48771; border:1px solid #5a2d2d; }

::-webkit-scrollbar { width: 6px; height: 8px; }
::-webkit-scrollbar-track { background-color: #1e1e1e; }
::-webkit-scrollbar-thumb { background-color: #555; }
</style>
</head>
<body>

<div id="toolbar">
  <label>语言:</label>
  <select id="lang_sel">
    <option value="js" selected>JavaScript</option>
    <option value="css">CSS</option>
    <option value="sql">SQL</option>
  </select>
  <button onclick="demo_beautify()" title="Ctrl+Shift+F">格式化</button>
  <button onclick="demo_ai_toggle()" title="Ctrl+K">AI 助手</button>
  <span class="spacer"></span>
  <span id="ai_status"></span>
  <button onclick="openSettings()" title="AI 设置">&#9881;</button>
  <label>Theme:</label>
  <select id="theme_sel">
    <option value="ace/theme/cobalt" selected>Cobalt</option>
    <option value="ace/theme/monokai">Monokai</option>
    <option value="ace/theme/github">GitHub</option>
    <option value="ace/theme/eclipse">Eclipse</option>
    <option value="ace/theme/solarized_dark">Solarized Dark</option>
    <option value="ace/theme/solarized_light">Solarized Light</option>
    <option value="ace/theme/one_dark">One Dark</option>
    <option value="ace/theme/dracula">Dracula</option>
    <option value="ace/theme/twilight">Twilight</option>
    <option value="ace/theme/chrome">Chrome</option>
  </select>
  <span id="mode_status"></span>
</div>

<pre id="code"></pre>

<!-- 设置覆盖层 -->
<div id="settings_overlay">
  <div id="settings_dialog">
    <h2>AI 供应商设置</h2>
    <div class="body">
      <div class="s_row">
        <span class="s_label">供应商</span>
        <select id="set_provider">
          <option value="openai">OpenAI</option>
          <option value="deepseek">DeepSeek</option>
          <option value="qwen">通义千问</option>
          <option value="ollama">Ollama (本地)</option>
          <option value="zhipu">智谱 GLM</option>
          <option value="custom">自定义</option>
        </select>
      </div>
      <div class="s_row">
        <span class="s_label">模型</span>
        <select id="set_model"></select>
      </div>
      <div class="s_row" id="set_key_row">
        <span class="s_label">API Key</span>
        <input id="set_api_key" type="password" placeholder="sk-...">
      </div>
      <div class="s_row" id="set_base_row" style="display:none">
        <span class="s_label">Base URL</span>
        <input id="set_base_url" type="text" placeholder="https://api.openai.com/v1">
      </div>
      <div class="s_row">
        <span class="s_label">连接方式</span>
        <select id="set_use_proxy">
          <option value="1">后端代理</option>
          <option value="0">浏览器直连</option>
        </select>
      </div>

      <div id="test_result"></div>

      <div class="s_btns">
        <button class="btn_test" onclick="testConnection()" title="测试当前配置能否连通">测试连接</button>
        <button class="btn_cancel" onclick="closeSettings()">取消</button>
        <button class="btn_save" onclick="saveSettings()">保存</button>
      </div>
    </div>
  </div>
</div>

<!-- 依赖 -->
<script src="../../../third-party/ace/v1.44.0/src-min/ace.js"></script>
<script src="../../../third-party/ace/v1.44.0/src-min/ext-language_tools.js"></script>
<script src="../../../third-party/js-beautify/v1.14.11/lib/beautify.min.js"></script>
<script src="../../../third-party/js-beautify/v1.14.11/lib/beautify-css.min.js"></script>
<script src="../../../third-party/sql-formatter/dist/sql-formatter.min.js"></script>
<script src="../../../third-party/markdown-editor-master/markdown-it.js"></script>
<script src="../../js/EWAC_AI_HELPER.js"></script>

<script>
var editor, mode, currentLang = 'js';

var DEMO_CODE = {
  js:
    '// JavaScript 示例 — 数据脱敏工具\n' +
    'function maskPhone(phone) {\n' +
    '    if (!phone || phone.length < 7) return phone;\n' +
    '    return phone.substring(0, 3) + "****" + phone.substring(7);\n' +
    '}\n' +
    '\n' +
    'function maskEmail(email) {\n' +
    '    const [name, domain] = email.split("@");\n' +
    '    if (name.length <= 2) return name + "***@" + domain;\n' +
    '    return name[0] + "***" + name[name.length - 1] + "@" + domain;\n' +
    '}\n' +
    '\n' +
    'function maskIdCard(id) {\n' +
    '    if (!id || id.length !== 18) return id;\n' +
    '    return id.substring(0, 6) + "********" + id.substring(14);\n' +
    '}\n' +
    '\n' +
    '// 使用示例\n' +
    'console.log(maskPhone("13812345678"));\n' +
    'console.log(maskEmail("zhangsan@example.com"));\n',

  css:
    '/* CSS 示例 — 卡片布局 */\n' +
    '.card {\n' +
    '    border: 1px solid #e0e0e0;\n' +
    '    border-radius: 8px;\n' +
    '    padding: 20px;\n' +
    '    box-shadow: 0 2px 8px rgba(0,0,0,0.1);\n' +
    '    transition: box-shadow 0.3s ease;\n' +
    '}\n' +
    '\n' +
    '.card:hover {\n' +
    '    box-shadow: 0 4px 16px rgba(0,0,0,0.15);\n' +
    '}\n' +
    '\n' +
    '.card__title {\n' +
    '    font-size: 18px;\n' +
    '    font-weight: bold;\n' +
    '    margin-bottom: 12px;\n' +
    '    color: #333;\n' +
    '}\n' +
    '\n' +
    '.card__body {\n' +
    '    font-size: 14px;\n' +
    '    color: #666;\n' +
    '    line-height: 1.6;\n' +
    '}\n' +
    '\n' +
    '.card__footer {\n' +
    '    margin-top: 16px;\n' +
    '    padding-top: 12px;\n' +
    '    border-top: 1px solid #f0f0f0;\n' +
    '}\n',

  sql:
    '-- SQL 示例 — 员工部门查询\n' +
    'SELECT\n' +
    '    e.emp_id,\n' +
    '    e.emp_name,\n' +
    '    e.hire_date,\n' +
    '    d.dept_name,\n' +
    '    s.salary_amount\n' +
    'FROM employees e\n' +
    'INNER JOIN departments d ON e.dept_id = d.dept_id\n' +
    'LEFT JOIN salaries s ON e.emp_id = s.emp_id\n' +
    'WHERE e.status = 1\n' +
    '    AND e.hire_date >= \'2020-01-01\'\n' +
    '    AND d.dept_type IN (\'DEV\', \'QA\', \'OPS\')\n' +
    'ORDER BY d.dept_name, e.hire_date DESC\n'
};

function getText() { return editor ? editor.getValue() : ''; }

function setText(t) {
  if (editor) { editor.setValue(t, 1); editor.selection.clearSelection(); }
}

function demo_beautify() {
  var p = editor.getCursorPosition(), txt = getText(), s;
  if (mode === 'ace/mode/javascript') {
    s = js_beautify(txt);
  } else if (mode === 'ace/mode/css') {
    s = css_beautify(txt);
  } else if (mode === 'ace/mode/sql') {
    var cfg = {
      language: 'tsql', tabWidth: '4', useTabs: false,
      keywordCase: 'upper', dataTypeCase: 'preserve',
      functionCase: 'preserve', identifierCase: 'preserve',
      indentStyle: 'standard', logicalOperatorNewline: 'before',
      expressionWidth: '82', lineBetweenQueries: '1',
      denseOperators: false, newlineBeforeSemicolon: false
    };
    try { s = sqlFormatter.format(txt, cfg); } catch (e) { alert(e); return; }
  } else { alert('当前语言不支持格式化'); return; }
  editor.setValue(s, 1);
  editor.moveCursorToPosition(p);
  editor.selection.clearSelection();
}

function demo_ai_toggle() {
  if (EWAC_AI_HELPER._panel && EWAC_AI_HELPER._panel.classList.contains('open')) {
    EWAC_AI_HELPER.hide();
  } else {
    EWAC_AI_HELPER.show();
  }
}

/* ======================== 设置对话框 ======================== */

function openSettings() {
  var cfg = EWAC_AI_HELPER.config;
  var selP = document.getElementById('set_provider');
  var selM = document.getElementById('set_model');

  selP.value = cfg.provider;
  refreshModelOptions();
  document.getElementById('set_api_key').value = cfg.api_key;
  document.getElementById('set_base_url').value = cfg.base_url || '';
  document.getElementById('set_use_proxy').value = cfg.use_proxy ? '1' : '0';
  refreshSettingsVisibility();
  clearTestResult();

  document.getElementById('settings_overlay').classList.add('show');
}

function closeSettings() {
  document.getElementById('settings_overlay').classList.remove('show');
}

function refreshModelOptions() {
  var provKey = document.getElementById('set_provider').value;
  var def = EWAC_AI_HELPER.providers[provKey] || EWAC_AI_HELPER.providers.custom;
  var sel = document.getElementById('set_model');
  sel.innerHTML = '';
  for (var i = 0; i < def.models.length; i++) {
    var m = def.models[i];
    sel.innerHTML += '<option value="' + m + '">' + m + '</option>';
  }
  if (def.models.length === 0) {
    sel.innerHTML += '<option value="">(手动输入到 Base URL)</option>';
  }
  sel.value = EWAC_AI_HELPER.config.model || def.model;
}

function refreshSettingsVisibility() {
  var provKey = document.getElementById('set_provider').value;
  var isCustom = provKey === 'custom';
  var isOllama = provKey === 'ollama';

  document.getElementById('set_key_row').style.display = isOllama ? 'none' : 'flex';
  document.getElementById('set_base_row').style.display = isCustom ? 'flex' : 'none';
}

function saveSettings() {
  EWAC_AI_HELPER.config.provider  = document.getElementById('set_provider').value;
  EWAC_AI_HELPER.config.model     = document.getElementById('set_model').value;
  EWAC_AI_HELPER.config.api_key   = document.getElementById('set_api_key').value;
  EWAC_AI_HELPER.config.base_url  = document.getElementById('set_base_url').value;
  EWAC_AI_HELPER.config.use_proxy = document.getElementById('set_use_proxy').value === '1';

  EWAC_AI_HELPER._saveConfig();
  updateAiStatus();
  closeSettings();
}

function clearTestResult() {
  var r = document.getElementById('test_result');
  r.className = '';
  r.style.display = 'none';
  r.textContent = '';
}

function testConnection() {
  var provKey = document.getElementById('set_provider').value;
  var base = document.getElementById('set_base_url').value;
  var key   = document.getElementById('set_api_key').value;
  var model = document.getElementById('set_model').value;
  var isProxy = document.getElementById('set_use_proxy').value === '1';
  var resultEl = document.getElementById('test_result');

  if (isProxy) {
    resultEl.className = 'ok';
    resultEl.textContent = '后端代理模式 — 连接测试请在后端完成。\n当前配置: ' +
      provKey + ' / ' + model;
    return;
  }

  var def = EWAC_AI_HELPER.providers[provKey] || EWAC_AI_HELPER.providers.custom;
  var url = base || def.base;
  url = url.replace(/\/+$/, '') + '/chat/completions';

  resultEl.className = 'ok';
  resultEl.textContent = '正在测试连接 ' + url + ' ...';

  var xhr = new XMLHttpRequest();
  xhr.open('POST', url, true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  if (key) { xhr.setRequestHeader('Authorization', 'Bearer ' + key); }

  var t0 = Date.now();
  xhr.onload = function() {
    var ms = Date.now() - t0;
    try {
      var r = JSON.parse(xhr.responseText);
      if (r.choices || r.object === 'chat.completion') {
        resultEl.className = 'ok';
        resultEl.textContent = '连接成功! (' + ms + 'ms)\n模型: ' +
          (r.model || model) + '\n' + JSON.stringify(r.usage || {}, null, 2);
      } else if (r.error) {
        resultEl.className = 'err';
        resultEl.textContent = 'API 错误 (' + ms + 'ms):\n' +
          r.error.message + '\n' + JSON.stringify(r.error, null, 2);
      } else {
        resultEl.className = 'ok';
        resultEl.textContent = '响应 (' + ms + 'ms):\n' + JSON.stringify(r, null, 2).substring(0, 500);
      }
    } catch (e) {
      resultEl.className = 'err';
      resultEl.textContent = '解析失败 (' + ms + 'ms):\n' +
        'HTTP ' + xhr.status + '\n' + xhr.responseText.substring(0, 400);
    }
  };
  xhr.onerror = function() {
    resultEl.className = 'err';
    resultEl.textContent = '连接失败: 无法访问 ' + url +
      '\n请检查 Base URL 或网络（本地 Ollama 需启动服务）';
  };
  xhr.timeout = 10000;
  xhr.ontimeout = function() {
    resultEl.className = 'err';
    resultEl.textContent = '连接超时 (10s): ' + url;
  };

  var body = JSON.stringify({
    model: model,
    messages: [{ role: 'user', content: 'hi' }],
    max_tokens: 5,
    stream: false
  });
  xhr.send(body);
}

function updateAiStatus() {
  var cfg = EWAC_AI_HELPER.config;
  var def = EWAC_AI_HELPER._getProviderDef();
  var el = document.getElementById('ai_status');
  var mode = cfg.use_proxy ? '代理' : '直连';
  el.textContent = def.name + ' / ' + cfg.model + ' (' + mode + ')';
}

/* ======================== 事件绑定 ======================== */

document.getElementById('set_provider').onchange = function() {
  refreshModelOptions();
  refreshSettingsVisibility();
  clearTestResult();
};

document.getElementById('set_use_proxy').onchange = function() {
  clearTestResult();
};

document.getElementById('settings_overlay').onclick = function(e) {
  if (e.target === this) { closeSettings(); }
};

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && document.getElementById('settings_overlay').classList.contains('show')) {
    closeSettings();
  }
});

/* ======================== 初始化 ======================== */

function changeLang(lang) {
  currentLang = lang;
  if (lang === 'js') { mode = 'ace/mode/javascript'; }
  else if (lang === 'css') { mode = 'ace/mode/css'; }
  else if (lang === 'sql') { mode = 'ace/mode/sql'; }
  editor.session.setMode(mode);
  setText(DEMO_CODE[lang]);
  var labels = { js: 'JavaScript', css: 'CSS', sql: 'SQL' };
  document.getElementById('mode_status').textContent = '(当前: ' + labels[lang] + ')';
}

(function init() {
  ace.require('ace/ext/language_tools');

  editor = ace.edit('code');
  mode = 'ace/mode/javascript';

  editor.setTheme('ace/theme/cobalt');
  editor.session.setMode(mode);
  editor.getSession().setUseWrapMode(true);
  editor.setOptions({
    enableBasicAutocompletion: true,
    enableSnippets: true,
    enableLiveAutocompletion: true
  });
  editor.$blockScrolling = Infinity;
  editor.setFontSize(14);

  editor.commands.addCommand({
    name: 'beautify',
    bindKey: { win: 'Ctrl-Shift-F', mac: 'Command-Shift-F' },
    exec: function() { demo_beautify(); },
    readOnly: true
  });
  editor.commands.addCommand({
    name: 'aiToggle',
    bindKey: { win: 'Ctrl-K', mac: 'Command-K' },
    exec: function() { demo_ai_toggle(); },
    readOnly: true
  });

  EWAC_AI_HELPER.init(editor, {
    apiUrl: '../cgi-bin/xml/?type=AI'
  });

  updateAiStatus();

  document.getElementById('lang_sel').onchange = function() { changeLang(this.value); };
  document.getElementById('theme_sel').onchange = function() {
    editor.setTheme(this.value);
    window.localStorage['EWA_CODE_THENE'] = this.value;
  };

  var savedTheme = window.localStorage && window.localStorage['EWA_CODE_THENE'];
  if (savedTheme) {
    document.getElementById('theme_sel').value = savedTheme;
    editor.setTheme(savedTheme);
  }

  setText(DEMO_CODE.js);
  document.getElementById('mode_status').textContent = '(当前: JavaScript)';
})();
</script>
</body>
</html>
